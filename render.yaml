services:
  - type: web
    name: peralta-pos-api
    runtime: docker
    plan: free
    branch: main
    dockerfilePath: ./Dockerfile
    autoDeployTrigger: commit
    healthCheckPath: /api/health
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: render
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ALLOWED_ORIGINS
        value: https://*.vercel.app,tauri://localhost
      - key: DGII_RNC_AUTO_SYNC_ENABLED
        value: false
      - key: DB_URL
        sync: false
      - key: DB_USER
        sync: false
      - key: DB_PASSWORD
        sync: false
