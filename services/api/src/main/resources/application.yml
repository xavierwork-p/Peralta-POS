server:
  port: ${PORT:${SERVER_PORT:8080}}
  servlet:
    context-path: /

spring:
  application:
    name: peralta-pos-api
  datasource:
    # MySQL es la base principal del proyecto para que sea facil de revisar con MySQL Workbench.
    # Para una base remota solo se cambia host, usuario y password.
    url: ${DB_URL:jdbc:mysql://localhost:3306/peralta_pos?createDatabaseIfNotExist=true&serverTimezone=UTC&allowPublicKeyRetrieval=true&useSSL=false}
    username: ${DB_USER:peralta}
    password: ${DB_PASSWORD:peralta123}
  jpa:
    hibernate:
      # Flyway controla el esquema; Hibernate no debe inventar tablas automaticamente.
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
        type:
          preferred_uuid_jdbc_type: CHAR
        jdbc:
          time_zone: UTC
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration

app:
  security:
    jwt-secret: ${JWT_SECRET:replace-with-a-long-secure-secret}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173,http://localhost:5174,http://127.0.0.1:5174,tauri://localhost}
  taxpayer:
    dgii:
      # URL opcional para un servicio autorizado de consulta RNC.
      # Debe responder JSON con name/nombre/razonSocial y opcionalmente status/estado.
      lookup-url: ${DGII_RNC_LOOKUP_URL:}
  dgii:
    rnc:
      url: ${DGII_RNC_ZIP_URL:https://dgii.gov.do/app/WebApps/Consultas/RNC/DGII_RNC.zip}
      auto-sync-enabled: ${DGII_RNC_AUTO_SYNC_ENABLED:true}
      stale-after-hours: ${DGII_RNC_STALE_AFTER_HOURS:24}
      sync-cron: ${DGII_RNC_SYNC_CRON:0 0 3 * * *}

management:
  endpoints:
    web:
      exposure:
        include: health,info
