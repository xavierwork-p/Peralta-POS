spring:
  datasource:
    url: jdbc:mysql://${MYSQLHOST}:${MYSQLPORT}/${MYSQLDATABASE}?serverTimezone=UTC&allowPublicKeyRetrieval=true&useSSL=false
    username: ${MYSQLUSER}
    password: ${MYSQLPASSWORD}

app:
  cors:
    # Cambiar en Railway cuando Vercel entregue la URL final.
    # Ejemplo:
    # CORS_ALLOWED_ORIGINS=https://peralta-pos.vercel.app,tauri://localhost
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173,tauri://localhost}
  dgii:
    rnc:
      # En la nube se deja apagado por defecto para evitar que el primer arranque tarde demasiado.
      # Se puede activar luego con DGII_RNC_AUTO_SYNC_ENABLED=true.
      auto-sync-enabled: ${DGII_RNC_AUTO_SYNC_ENABLED:false}
